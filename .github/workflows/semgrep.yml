name: Loop 2 — Semgrep Security Scan

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    # Only run on PRs from the same repo (not forks) to avoid secret exposure
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        id: semgrep
        run: |
          semgrep ci \
            --config=p/python \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --config=p/jwt \
            --config=p/secrets \
            --sarif \
            --output=semgrep-results.sarif
        continue-on-error: true  # Upload SARIF even on failure; step shows as failed in UI

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Upload Semgrep report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report-${{ github.sha }}
          path: semgrep-results.sarif
          retention-days: 90
