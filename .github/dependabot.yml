version: 2

updates:
  # Python dependencies — scans requirements.txt for new CVEs weekly
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
    # Group minor/patch updates together to reduce PR noise
    # Critical security updates always get their own PR
    groups:
      non-critical-deps:
        update-types:
          - minor
          - patch

  # GitHub Actions — keeps action versions up to date (supply chain security)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    labels:
      - "dependencies"
      - "github-actions"
